<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropData List Builder — Step 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="js/auth.js"></script>
</head>
<body>

<div class="app">

  <div class="job-status-banner"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="app-header__inner">
      <div style="display:flex; align-items:center; gap:var(--space-4);">
        <a href="orders.html" class="btn btn-outline btn-sm">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </a>
        <h1 style="font-size:var(--font-size-2xl); font-weight:var(--font-weight-semibold); color:var(--color-neutral-900);">Define Your Pull</h1>
      </div>

      <!-- Close overlay -->
      <a href="orders.html" class="overlay-close" aria-label="Close and return to My Lists">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="app-main">

    <!-- QuickList Templates — DS 23 -->
    <section class="quicklist-templates">
      <div class="section-header">
        <h2>QuickList Templates</h2>
        <p>Start with a pre-configured template</p>
      </div>

      <div class="template-card-grid">

        <button class="template-card" data-template="active-listings" type="button">
          <span class="template-card__check" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="template-card__title">Active Listings</span>
          <span class="template-card__desc">Properties currently on the market</span>
          <span class="template-card__meta">~3,284 records</span>
        </button>

        <button class="template-card" data-template="failed-listings" type="button">
          <span class="template-card__check" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="template-card__title">Failed Listings</span>
          <span class="template-card__desc">Properties that expired or were withdrawn</span>
          <span class="template-card__meta">~892 records</span>
        </button>

        <button class="template-card" data-template="absentee-owners" type="button">
          <span class="template-card__check" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="template-card__title">Absentee Owners</span>
          <span class="template-card__desc">Owners who don't live at the property</span>
          <span class="template-card__meta">~7,651 records</span>
        </button>

        <button class="template-card" data-template="high-equity" type="button">
          <span class="template-card__check" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5l2.5 2.5L10 3.5" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="template-card__title">High Equity</span>
          <span class="template-card__desc">Properties with significant equity</span>
          <span class="template-card__meta">~2,134 records</span>
        </button>

      </div>
    </section>

    <!-- Filter Builder — DS 24 -->
    <div class="section-header">
      <h2>Custom Filters</h2>
      <p>Refine your list criteria</p>
    </div>
    <div id="filterBuilderMount"></div>

  </main>

  <!-- Action Bar — DS 26 -->
  <footer class="action-bar">
    <div class="action-bar__inner">
      <p class="action-bar__hint" id="bottomHint">Select location, template, or filters to get started</p>
      <button
        class="btn btn-primary btn-md"
        id="estimateBtn"
        type="button"
        disabled
        onclick="startEstimate()"
      >
        <svg id="estimateIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="2" y="2" width="12" height="12" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M5 6h6M5 9h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg id="estimateSpinner" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" style="display:none; animation:spin 0.7s linear infinite;">
          <circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
          <path d="M8 2a6 6 0 0 1 6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span id="estimateLabel">Estimate Pull</span>
      </button>
    </div>
  </footer>

</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="js/filter-builder.js"></script>
<script src="js/app.js"></script>
<script>
initPage();
function startEstimate() {
  const btn = document.getElementById('estimateBtn');
  btn.disabled = true;
  document.getElementById('estimateIcon').style.display    = 'none';
  document.getElementById('estimateSpinner').style.display = '';
  document.getElementById('estimateLabel').textContent     = 'Estimating…';
  setTimeout(() => { window.location.href = 'step2.html'; }, 1400);
}
</script>
</body>
</html>
